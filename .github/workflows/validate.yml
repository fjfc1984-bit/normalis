name: Validacion NormaLis

on:
  push:
    branches: [ main ]
    paths:
      - '*.html'
      - '*.js'
      - '*.css'
      - 'normalis-validate.sh'
      - 'validate-*.sh'
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validar integridad del codigo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar validador maestro NormaLis
        run: |
          chmod +x normalis-validate.sh
          bash normalis-validate.sh --verbose

      - name: Resumen en caso de fallo
        if: failure()
        run: |
          echo ""
          echo "========================================================"
          echo "  FALLO DE VALIDACION — deploy bloqueado"
          echo "  Revisa los errores criticos en el paso anterior."
          echo "  Para diagnostico local: bash normalis-validate.sh"
          echo "========================================================"
