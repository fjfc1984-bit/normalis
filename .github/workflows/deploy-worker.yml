name: Deploy Cloudflare Worker

on:
  push:
    branches: [ main ]
    paths:
      - 'cloudflare-worker/**'
  workflow_dispatch:   # permite trigger manual desde la UI de GitHub

jobs:
  deploy:
    name: Deploy normalis worker a Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare-worker
          command: deploy
